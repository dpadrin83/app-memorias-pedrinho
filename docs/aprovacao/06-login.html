<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login · Prompt 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="_ds.css" />
  </head>
  <body>
    <div class="approval-banner">
      <strong>Prompt 4 — Autenticação</strong> ·
      <a href="index.html">índice</a>
    </div>
    <div class="login-page">
      <div class="login-card">
        <div class="login-brand">
          <span class="login-mark">M</span>
          <div>
            <h1 style="font-weight:500;font-size:var(--text-h2);margin:0">Memórias</h1>
            <p style="font-size:var(--text-small);color:var(--text-secondary);margin:4px 0 0">Portal privado da família</p>
          </div>
        </div>
        <form>
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input id="email" type="email" placeholder="seu@email.com" />
          </div>
          <div class="field">
            <label class="field-label" for="senha">Senha</label>
            <input id="senha" type="password" placeholder="••••••••" />
          </div>
          <button type="button" class="btn btn-primary" style="width:100%;justify-content:center">Entrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
