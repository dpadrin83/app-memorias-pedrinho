<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile · Drawer — DS v0.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="_ds.css" />
  </head>
  <body>
    <div class="approval-banner">Drawer abaixo de <strong>760px</strong> (DS §3.1) · toque em ☰</div>
    <div class="drawer-backdrop" id="backdrop"></div>
    <div class="app-shell">
      <aside class="ld-sidebar app-sidebar" id="sidebar">
        <div class="app-sidebar-scroll">
          <a class="ld-brand" href="#"><span class="mark">M</span>Memórias</a>
          <a class="ld-item active" href="#"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>Fotos</a>
          <a class="ld-item" href="#"><span class="dot-cat" style="background:var(--yellow)"></span>Álbuns</a>
          <a class="ld-item" href="#"><span class="dot-cat" style="background:var(--green)"></span>Pessoas</a>
          <a class="ld-item" href="#"><span class="dot-cat" style="background:var(--red)"></span>Tags</a>
          <a class="ld-item" href="#"><span class="dot-cat" style="background:var(--purple)"></span>Favoritos</a>
        </div>
        <div class="sidebar-footer">
          <a class="sidebar-user" href="#"><span class="avatar md blue">DP</span><div class="sidebar-user-meta"><p class="sidebar-user-name">Danilo</p></div></a>
        </div>
      </aside>
      <div class="app-main">
        <div class="ld-topbar-mobile">
          <button type="button" class="icon-btn" id="menuBtn" aria-label="Menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          </button>
          <span class="ld-topbar-title">Fotos</span>
          <button type="button" class="btn btn-primary btn-sm" style="margin-left:auto">Enviar</button>
        </div>
        <div class="ld-topbar">
          <span class="ld-topbar-title">Fotos</span>
          <a class="icon-btn sm" href="#" aria-label="Buscar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></a>
        </div>
        <div class="app-canvas">
          <header class="cat-header fotos">
            <div class="cat-head-left">
              <div class="cat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg></div>
              <div class="cat-text"><h1 class="cat-title">Fotos</h1><p class="cat-sub">312 itens</p></div>
            </div>
          </header>
          <div class="screen-body">
            <nav class="tabs"><a class="tab active" href="#">Grid</a><a class="tab" href="#">Linha do tempo</a><a class="tab" href="#">Calendário</a><a class="tab" href="#">Mapa</a><a class="tab" href="#">Lista</a></nav>
            <div class="ph-grid">
              <div class="photo-card"><img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=400&q=80&auto=format&fit=crop" alt="" /></div>
              <div class="photo-card"><img src="https://images.unsplash.com/photo-1492725764893-90b379c2b6e7?w=400&q=80&auto=format&fit=crop" alt="" /></div>
              <div class="photo-card"><img src="https://images.unsplash.com/photo-1471286174890-9c112ffca5b4?w=400&q=80&auto=format&fit=crop" alt="" /></div>
              <div class="photo-card"><img src="https://images.unsplash.com/photo-1519340241574-2cec6aef0c01?w=400&q=80&auto=format&fit=crop" alt="" /></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const sidebar = document.getElementById("sidebar");
      const backdrop = document.getElementById("backdrop");
      document.getElementById("menuBtn").addEventListener("click", () => {
        const open = !sidebar.classList.contains("open");
        sidebar.classList.toggle("open", open);
        backdrop.classList.toggle("open", open);
      });
      backdrop.addEventListener("click", () => {
        sidebar.classList.remove("open");
        backdrop.classList.remove("open");
      });
    </script>
  </body>
</html>
